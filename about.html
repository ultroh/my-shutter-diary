<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - My Shutter Story</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #fafafa; color: #333; }
        
        header { text-align: center; padding: 60px 20px 40px; }
        header h1 { font-size: 24px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; white-space: nowrap; }
        header h1 a { text-decoration: none; color: inherit; }
        nav a { margin: 0 15px; text-decoration: none; color: #999; font-size: 13px; letter-spacing: 2px; transition: color 0.3s ease; }
        nav a:hover, nav a.active { color: #000; font-weight: bold; }

        .about-container {
            display: flex;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 20px 80px;
            gap: 40px;
        }
        .about-img {
            flex: 1;
            min-width: 300px;
            height: 400px;
            background-color: #e0e0e0;
            background-image: url('https://picsum.photos/id/1025/400/500'); /* 임시 프로필 이미지 */
            background-size: cover;
            background-position: center;
        }
        .about-text {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.8;
            color: #555;
        }
        .about-text h2 { margin-bottom: 20px; font-weight: 300; color: #333; letter-spacing: 2px; }

        @media (max-width: 768px) {
            header { padding: 40px 10px 30px; }
            header h1 { font-size: 6vw; letter-spacing: 2px; }
            nav a { margin: 0 8px; font-size: 12px; }
            .about-container { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="index.html">My Shutter Story</a></h1>
        <nav>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="about.html" class="active">ABOUT</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <main class="about-container">
        <div class="about-img"></div>
        <div class="about-text">
            <h2>Hello.</h2>
            <p>셔터 너머의 세상을 기록하는 사진가입니다.</p>
            <br>
            <p>자연의 고요한 풍경과 일상 속에서 스쳐 지나가는 빛의 순간들을 포착하는 것을 즐깁니다. 프레임 안에 담긴 이야기가 누군가에게 작은 영감과 위로가 되기를 바랍니다.</p>
            <br>
            <p>Email: myemail@example.com</p>
        </div>
    </main>
</body>
</html>
