<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - My Shutter Story</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #fafafa; color: #333; }
        
        header { text-align: center; padding: 60px 20px 40px; }
        header h1 { font-size: 24px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; white-space: nowrap; }
        header h1 a { text-decoration: none; color: inherit; } /* 제목 클릭 시 메인으로 이동 */
        nav a { margin: 0 15px; text-decoration: none; color: #999; font-size: 13px; letter-spacing: 2px; transition: color 0.3s ease; }
        nav a:hover, nav a.active { color: #000; font-weight: bold; }

        .content { max-width: 1200px; margin: 0 auto; padding: 20px 15px 60px; text-align: center; }
        .content h2 { font-weight: 300; letter-spacing: 2px; margin-bottom: 10px; }
        
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 40px;
        }
        .category-item {
            height: 300px;
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #666;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .category-item:hover { background-color: #ddd; color: #000; }

        @media (max-width: 768px) {
            header { padding: 40px 10px 30px; }
            header h1 { font-size: 6vw; letter-spacing: 2px; }
            nav a { margin: 0 8px; font-size: 12px; }
            .category-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 150px; }
            .category-item { height: 100%; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="index.html">My Shutter Story</a></h1>
        <nav>
            <a href="portfolio.html" class="active">PORTFOLIO</a>
            <a href="about.html">ABOUT</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <main class="content">
        <h2>My Works</h2>
        <p style="color: #666; font-size: 14px;">카테고리별 앨범</p>
        
        <div class="category-grid">
            <div class="category-item">Landscape</div>
            <div class="category-item">Portrait</div>
            <div class="category-item">Street</div>
            <div class="category-item">Travel</div>
        </div>
    </main>
</body>
</html>
