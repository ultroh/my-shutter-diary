<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - My Shutter Story</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #fafafa; color: #333; }
        
        header { text-align: center; padding: 60px 20px 40px; }
        header h1 { font-size: 24px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; white-space: nowrap; }
        header h1 a { text-decoration: none; color: inherit; }
        nav a { margin: 0 15px; text-decoration: none; color: #999; font-size: 13px; letter-spacing: 2px; transition: color 0.3s ease; }
        nav a:hover, nav a.active { color: #000; font-weight: bold; }

        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 20px 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .contact-form h2 { text-align: center; font-weight: 300; margin-bottom: 20px; letter-spacing: 2px; }
        
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 14px; letter-spacing: 1px; color: #555; }
        input, textarea { 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-family: inherit; 
            font-size: 14px;
            background-color: #fff;
        }
        input:focus, textarea:focus { outline: none; border-color: #999; }
        textarea { resize: vertical; min-height: 150px; }
        
        button { 
            padding: 15px; 
            background-color: #333; 
            color: white; 
            border: none; 
            border-radius: 4px;
            cursor: pointer; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            transition: background-color 0.3s; 
            margin-top: 10px;
        }
        button:hover { background-color: #000; }

        @media (max-width: 768px) {
            header { padding: 40px 10px 30px; }
            header h1 { font-size: 6vw; letter-spacing: 2px; }
            nav a { margin: 0 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="index.html">My Shutter Story</a></h1>
        <nav>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="about.html">ABOUT</a>
            <a href="contact.html" class="active">CONTACT</a>
        </nav>
    </header>

    <main>
        <form class="contact-form" action="#" method="POST">
            <h2>Get in Touch</h2>
            <div class="form-group">
                <label for="name">NAME</label>
                <input type="text" id="name" name="name" required placeholder="이름을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" required placeholder="답변 받을 이메일 주소">
            </div>
            <div class="form-group">
                <label for="message">MESSAGE</label>
                <textarea id="message" name="message" required placeholder="문의하실 내용을 남겨주세요"></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
    </main>
</body>
</html>
