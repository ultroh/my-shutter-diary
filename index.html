<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        /* 기본 설정 및 여백 초기화 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
            line-height: 1.6;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* 헤더 및 내비게이션 */
        header { text-align: center; padding: 60px 20px 40px; }
        header h1 {
            font-size: 24px; font-weight: 300; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 20px;
        }
        nav a {
            margin: 0 15px; text-decoration: none; color: #999;
            font-size: 13px; letter-spacing: 2px; transition: color 0.3s;
            cursor: pointer;
        }
        nav a:hover, nav a.active { color: #000; font-weight: bold; }

        /* 컨텐츠 섹션 관리 */
        .content-section { display: none; max-width: 1200px; margin: 0 auto; padding: 0 15px 60px; }
        .content-section.active { display: block; }

        /* 정사각형 반응형 갤러리 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; 
        }

        .gallery-item {
            width: 100%;
            overflow: hidden;
            background-color: #eee;
            aspect-ratio: 1 / 1; 
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.6s ease;
            cursor: pointer;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
        }

        .gallery-item:hover img { transform: scale(1.05); }

        /* 정보(About) & 연락처(Contact) 스타일 */
        .text-content { text-align: center; padding: 50px 20px; max-width: 700px; margin: 0 auto; }
        .text-content h2 { font-weight: 300; margin-bottom: 20px; letter-spacing: 2px; }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            header { padding: 40px 10px 30px; }
            header h1 { font-size: 6vw; letter-spacing: 2px; }
            nav a { margin: 0 8px; font-size: 12px; }
            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
        }

        /* 라이트박스 및 사진 설명(Caption) 스타일 */
        #lightbox {
            display: none; position: fixed; z-index: 999; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            /* [수정됨] 사진과 텍스트를 세로로 배치하기 위해 flex-direction 추가 */
            flex-direction: column; 
            justify-content: center; align-items: center; opacity: 0; transition: 0.3s;
        }
        #lightbox.active { display: flex; opacity: 1; }
        #lightbox img { max-width: 90%; max-height: 80%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .close { position: absolute; top: 30px; right: 40px; color: #fff; font-size: 40px; cursor: pointer; }
        
        /* [추가됨] 라이트박스 하단 텍스트 스타일 */
        #lightbox-caption {
            color: #ddd;
            margin-top: 20px;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
        }
    </style>
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">

    <header>
        <h1>My Shutter Diary</h1>
        <nav>
            <a onclick="showSection('portfolio')" id="link-portfolio" class="active">PORTFOLIO</a>
            <a onclick="showSection('about')" id="link-about">ABOUT</a>
            <a onclick="showSection('contact')" id="link-contact">CONTACT</a>
        </nav>
    </header>

    <main>
        <section id="portfolio" class="content-section active">
            <div class="gallery">
                <div class="gallery-item"><img src="images/1.jpg" alt="사진 1" data-caption="빛이 들어오던 따뜻한 오후의 기록"></div>
                <div class="gallery-item"><img src="images/2.jpg" alt="사진 2" data-caption="비 오는 날,<br>창밖의 풍경"></div>
                <div class="gallery-item"><img src="images/3.jpg" alt="사진 3" data-caption="우연히 마주친 길고양이"></div>
                <div class="gallery-item"><img src="images/4.jpg" alt="사진 4" data-caption="설명글이 필요 없다면 이렇게 비워두어도 됩니다."></div>
                <div class="gallery-item"><img src="images/5.jpg" alt="사진 5" data-caption=""></div>
                <div class="gallery-item"><img src="images/6.jpg" alt="사진 6" data-caption="제주도 바다의 색감"></div>
                <div class="gallery-item"><img src="images/7.jpg" alt="사진 7" data-caption="필름 카메라 특유의 질감"></div>
                <div class="gallery-item"><img src="images/8.jpg" alt="사진 8" data-caption=""></div>
                <div class="gallery-item"><img src="images/9.jpg" alt="사진 9" data-caption=""></div>
                <div class="gallery-item"><img src="images/10.jpg" alt="사진 10" data-caption=""></div>
                <div class="gallery-item"><img src="images/11.jpg" alt="사진 11" data-caption=""></div>
            </div>
        </section>

        <section id="about" class="content-section">
            <div class="text-content">
                <h2>About Me</h2>
                <p>안녕하세요, 찰나의 순간을 기록하는 일기장 입니다.<br>
                세상의 따뜻한 색감과 이야기를 카메라에 담는 것을 좋아합니다.</p>
            </div>
        </section>

        <section id="contact" class="content-section">
            <div class="text-content">
                <h2>Contact</h2>
                <p>Email: your-email@example.com</p>
                <p>Instagram: @your_id</p>
            </div>
        </section>
    </main>

    <div id="lightbox">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="확대 사진">
        <div id="lightbox-caption"></div>
    </div>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(link => link.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.getElementById('link-' + sectionId).classList.add('active');
            window.scrollTo(0, 0);
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption'); // [추가됨] 캡션 요소 가져오기
        const images = document.querySelectorAll('.gallery-item img');
        const closeBtn = document.querySelector('.close');

        images.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                // [추가됨] 클릭한 사진의 data-caption 값을 가져와서 라이트박스에 넣기
                lightboxCaption.innerHTML = img.getAttribute('data-caption') || ''; 
                lightbox.classList.add('active');
            });
        });

        closeBtn.addEventListener('click', () => lightbox.classList.remove('active'));
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) lightbox.classList.remove('active');
        });
    </script>
</body>
</html>
