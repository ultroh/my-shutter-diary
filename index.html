<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        /* 기본 설정 및 여백 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
        }

        /* 미니멀한 헤더 및 내비게이션 */
        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            white-space: nowrap;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #999;
            font-size: 13px;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: #000;
            font-weight: 500;
        }

        /* 반응형 사진 그리드 레이아웃 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 400px;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px 60px;
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #eee;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            cursor: pointer;
        }

        .gallery-item:hover img {
            transform: scale(1.04);
        }

        /* === 모바일 화면 대응 수정 === */
        @media (max-width: 768px) {
            header {
                padding: 40px 10px 30px;
            }
            
            header h1 {
                font-size: 6vw; 
                letter-spacing: 2px;
            }

            nav a {
                margin: 0 8px;
                font-size: 12px;
            }

            .gallery {
                grid-template-columns: repeat(2, 1fr);
                grid-auto-rows: 200px; 
                gap: 10px;
            }
        }

        /* === 라이트박스(Lightbox) 스타일 === */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #lightbox.active {
            display: flex;
            opacity: 1;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #lightbox .close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        #lightbox .close:hover {
            color: #ccc;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Shutter Diary</h1>
        <nav>
            <a href="index.html" class="active">PORTFOLIO</a>
            <a href="about.html">ABOUT</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>

    <main class="gallery">
        <div class="gallery-item"><img src="images/DSC07320.JPG" alt="포트폴리오 사진 1"></div>
        <div class="gallery-item"><img src="images/DSC08446.jpg" alt="포트폴리오 사진 2"></div>
        <div class="gallery-item"><img src="images/IMG_1234.jpg" alt="포트폴리오 사진 3"></div>
        <div class="gallery-item"><img src="images/IMG_2345.JPG" alt="포트폴리오 사진 4"></div>
        <div class="gallery-item"><img src="images/IMG_3456.jpg" alt="포트폴리오 사진 5"></div>
        <div class="gallery-item"><img src="images/IMG_4225.jpg" alt="포트폴리오 사진 6"></div>
    </main>

    <div id="lightbox">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="확대된 사진">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const images = document.querySelectorAll('.gallery-item img');
        const closeBtn = document.querySelector('.close');

        images.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
            });
        });

        closeBtn.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });
    </script>
</body>
</html>
