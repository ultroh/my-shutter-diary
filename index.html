<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        /* 기본 설정 및 여백 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
        }

        /* 미니멀한 헤더 및 내비게이션 */
        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #999;
            font-size: 13px;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #000;
        }

        /* 반응형 사진 그리드 레이아웃 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 400px;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px 60px;
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #eee;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            cursor: pointer; /* 클릭 가능하다는 표시 */
        }

        .gallery-item:hover img {
            transform: scale(1.04);
        }

        /* 모바일 화면 대응 */
        @media (max-width: 768px) {
            header {
                padding: 40px 20px 30px;
            }
            .gallery {
                grid-auto-rows: 300px;
            }
        }

        /* === 라이트박스(Lightbox) 스타일 추가 === */
        #lightbox {
            display: none; /* 평소에는 숨겨둠 */
            position: fixed;
            z-index: 999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* 반투명한 검은색 배경 */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease; /* 부드럽게 나타나는 효과 */
        }

        #lightbox.active {
            display: flex;
            opacity: 1;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        #lightbox .close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        #lightbox .close:hover {
            color: #ccc;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Shutter Story</h1>
        <nav>
            <a href="#">PORTFOLIO</a>
            <a href="#">ABOUT</a>
            <a href="#">CONTACT</a>
        </nav>
    </header>

    <main class="gallery">
        <div class="gallery-item"><img src="https://photos.app.goo.gl/iSD1PPy9fbBTf3Tg9" alt="포트폴리오 사진 1"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/1062/600/800" alt="포트폴리오 사진 2"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/1074/800/600" alt="포트폴리오 사진 3"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/177/600/800" alt="포트폴리오 사진 4"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/292/800/800" alt="포트폴리오 사진 5"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/338/600/800" alt="포트폴리오 사진 6"></div>
    </main>

    <div id="lightbox">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="확대된 사진">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const images = document.querySelectorAll('.gallery-item img');
        const closeBtn = document.querySelector('.close');

        // 각 사진을 클릭했을 때 라이트박스 열기
        images.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src; // 클릭한 사진의 주소를 라이트박스 사진 주소로 복사
                lightbox.classList.add('active'); // 라이트박스 표시
            });
        });

        // X 버튼을 클릭했을 때 라이트박스 닫기
        closeBtn.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });

        // 사진 바깥의 어두운 배경을 클릭했을 때도 라이트박스 닫기
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });
    </script>
</body>
</html>
