<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        /* 기본 설정 및 여백 초기화 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #fafafa; /* 사진이 돋보이는 차분한 화이트 톤 */
            color: #333;
        }

        /* 미니멀한 헤더 및 내비게이션 */
        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #999;
            font-size: 13px;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #000; /* 마우스 오버 시 진하게 변경 */
        }

        /* 반응형 사진 그리드 레이아웃 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 400px; /* 사진들의 높이를 일정하게 맞춤 */
            gap: 15px; /* 사진 사이의 간격 */
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px 60px;
        }

        .gallery-item {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #eee; /* 이미지 로딩 전 배경색 */
        }

        /* 사진 핏 및 호버(Hover) 애니메이션 */
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 비율이 깨지지 않게 영역을 꽉 채움 */
            transition: transform 0.6s ease; /* 부드러운 애니메이션 효과 */
            cursor: pointer;
        }

        .gallery-item:hover img {
            transform: scale(1.04); /* 마우스 오버 시 사진이 살짝 커짐 */
        }

        /* 모바일 화면 대응 */
        @media (max-width: 768px) {
            header {
                padding: 40px 20px 30px;
            }
            .gallery {
                grid-auto-rows: 300px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Buma Photography</h1>
        <nav>
            <a href="#">PORTFOLIO</a>
            <a href="#">ABOUT</a>
            <a href="#">CONTACT</a>
        </nav>
    </header>

    <main class="gallery">
        <div class="gallery-item"><img src="https://picsum.photos/id/1011/600/800" alt="포트폴리오 사진 1"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/1062/600/800" alt="포트폴리오 사진 2"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/1074/800/600" alt="포트폴리오 사진 3"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/177/600/800" alt="포트폴리오 사진 4"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/292/800/800" alt="포트폴리오 사진 5"></div>
        <div class="gallery-item"><img src="https://picsum.photos/id/338/600/800" alt="포트폴리오 사진 6"></div>
    </main>

</body>
</html>
